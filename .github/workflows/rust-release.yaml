name: Publish - crates.io

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    name: Publish to Crates.io
    environment: crates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Formatting
        run: |
          rustup component add rustfmt
          cargo fmt --all --manifest-path rust/Cargo.toml -- --check
          
      - name: connect to crates.io
        run: echo "${{ secrets.CRATES_IO_TOKEN }}" | cargo login

      - name: Run unit tests
        run: cargo test --workspace --manifest-path=rust/Cargo.toml -- --skip test_e2e

      - name: Validate publish flow (dry-run)
        run: sh script/publish_crates.sh --dry-run --manifest-path rust/Cargo.toml

      - name: Publish crates
        if: github.event_name == 'release'
        run: sh script/publish_crates.sh --manifest-path rust/Cargo.toml

